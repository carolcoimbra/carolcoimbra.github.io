<!DOCTYPE HTML>
<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
        <title>UFMG INFORMÁTICA JÚNIOR</title>

        <script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/jquery/1.8.2/jquery.min.js"></script>
        <style type="text/css">
${demo.css}
        </style>
        <script type="text/javascript">

$(function () {
    $('#Question16').highcharts({
        chart: {
            plotBackgroundColor: null,
            plotBorderWidth: null,
            plotShadow: false,
            type: 'pie'
        },
        title: {
            text: 'Quanto tempo você pretende permanecer na empresa?'
        },
        credits: {
            enabled: false
        },
        tooltip: {
            pointFormat: '{series.name}: <b>{point.percentage:.1f}%</b>'
        },
        plotOptions: {
            pie: {
                allowPointSelect: true,
                cursor: 'pointer',
                dataLabels: {
                    enabled: true,
                    format: '<b>{point.name}</b>: {point.percentage:.1f} %'               
                }
            }
        },
        series: [{
            name: 'Porcentagem de Membros',
            colorByPoint: true,
            data: [{
                name: '0-6 meses',
                y: 8/20,
            },{
                name: 'Não souberam responder',
                y: 2/20
            }, {
                    name: '13 meses ou mais',
                y: 2/20
            },{   
                name: '7-12 meses',
                y: 8/20
            }]
        }]
    });
});

       </script>
    </head>
    <body>
<script src="https://code.highcharts.com/highcharts.js"></script>
<script src="https://code.highcharts.com/modules/exporting.js"></script>

<div id="Question16" style="min-width: 310px; height: 400px; margin: 0 auto"></div>
    </body>
</html>
