<!DOCTYPE HTML>
<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
        <title>UFMG INFORMÁTICA JÚNIOR</title>

        <script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/jquery/1.8.2/jquery.min.js"></script>
        <script src="https://code.highcharts.com/highcharts.js"></script>
        <script src="https://code.highcharts.com/highcharts-more.js"></script>
        <script src="https://code.highcharts.com/modules/exporting.js"></script>

        <style type="text/css">
${demo.css}
        </style>
        <script type="text/javascript">

var chart;
$(document).ready(function () {
    chart = new Highcharts.Chart({
        chart: {
            renderTo: 'Question8',
            polar: true,
            type: 'line'
        },
        
          credits: {
            enabled: false
        },

        title: {
            text: 'Quais desses projetos você gostaria de desenvolver?',
        },

        pane: {
            size: '80%'
        },

        xAxis: {
            categories: ['Desenvolvimento de Sistemas mobile', 'Desenvolvimento de Sistemas web', 'Desenvolvimento de Sites', 'Processo Seletivo/Programa Trainee', 'Planejamento Estratégico', 'Nenhum'],
            tickmarkPlacement: 'on',
            lineWidth: 0
        },

        yAxis: {
            lineWidth: 0,
            min: 0
        },

        tooltip: {
            shared: true,
            pointFormat: '<span style="color:{series.color}">{series.name}: <b>${point.y:,.0f}</b><br/>'
        },

        legend: {
            y: 70,
            layout: 'vertical'
        },

        series: [{
            name: 'Diretorias',
            data: [13, 12, 9, 7, 4, 1],
            pointPlacement: 'on',            
        }]

    });
});

       </script>
    </head>
    <body>
<script src="https://code.highcharts.com/highcharts.js"></script>
<script src="https://code.highcharts.com/modules/exporting.js"></script>

<div id="Question8" style="min-width: 310px; height: 400px; margin: 0 auto"></div>
    </body>
</html>
