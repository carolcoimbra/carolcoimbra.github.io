<!DOCTYPE HTML>
<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
        <title>UFMG INFORMÁTICA JÚNIOR</title>
        <script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/jquery/1.8.2/jquery.min.js"></script>
        <style type="text/css">
${demo.css}
        </style>
        <script type="text/javascript">

var chart;
$(document).ready(function () {
    chart = new Highcharts.Chart({
        chart: {
            renderTo: 'Question1'
        },
        credits: {
            enabled: false
        },
        legend: {
            layout: 'horizontal',
            verticalAlign: 'bottom'
        },
        title: {
            text: 'Como você avalia seu envolvimento atual na empresa?'
        },

        xAxis: [{
            title: {
                text: 'Avaliações'
            },
            categories: ['Nada envolvido', 'Pouco envolvido', 'Às vezes envolvido', 'Frequentemente envolvido', 'Totalmente envolvido']
        }],
        yAxis: [{
            title: {
                text: 'Quantidade de Membros'
            }
        }],
        series: [{
            data: [1, 3, 4, 11, 1],
            name: 'Avaliações',
            type: 'column'
        }]
    });
});

       </script>
    </head>
    <body>
<script src="https://code.highcharts.com/highcharts.js"></script>
<script src="https://code.highcharts.com/modules/exporting.js"></script>

<div id="Question1" style="min-width: 310px; height: 400px; margin: 0 auto"></div>
    </body>
</html>
