<!DOCTYPE HTML>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>UFMG INFORMÁTICA JÚNIOR</title>

    <script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/jquery/1.8.2/jquery.min.js"></script>
    <style type="text/css">
        ${demo.css}
    </style>
    <script type="text/javascript">

        var chart;
        $(document).ready(function () {
            chart = new Highcharts.Chart({
                chart: {
                    renderTo: 'Question14'
                },
                credits: {
                    enabled: false
                },
                legend: {
                    layout: 'horizontal',
                    verticalAlign: 'bottom'
                },
                title: {
                    text: 'A empresa me faz sentir importante no que faço.'
                },

                xAxis: [{
                    title: {
                        text: 'Avaliações'
                    },
                    categories: ['Discordo Completamente', 'Discordo', 'Nem concordo nem discordo', 'Concordo', 'Concordo Completamente']
                }],
                yAxis: [{
                    title: {
                        text: 'Quantidade de Membros'
                    }
                }],
                series: [{
                    data: [0, 1, 7, 9, 3],
                    name: 'Avaliações',
                    type: 'column'
                }]
            });
        });

    </script>
</head>
<body>
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>

    <div id="Question14" style="min-width: 310px; height: 400px; margin: 0 auto"></div>
