<!DOCTYPE HTML>
<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
        <title>UFMG INFORMÁTICA JÚNIOR</title>

        <script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/jquery/1.8.2/jquery.min.js"></script>
        <style type="text/css">
${demo.css}
        </style>
        <script type="text/javascript">

var chart;
$(document).ready(function () {
    chart = new Highcharts.Chart({
        chart: {
            renderTo: 'Question15'
        },
        credits: {
            enabled: false
        },
        legend: {
            layout: 'horizontal',
            verticalAlign: 'bottom'
        },
        title: {
            text: 'Quão motivado você está em permanecer na empresa nos próximos meses?'
        },
        tooltip: {
            formatter: function () {
                if (this.series.name == 'Cumulativo') {
                    return this.y + '%';
                }
                return this.x + '<br/>' + '<b> ' + this.y.toString().replace('.', ',') + ' </b>';
            }
        },
        xAxis: [{
            title: {
                text: 'Avaliação'
            },
            categories: ['1', '2', '3', '4', '5']
        }],
        yAxis: [{
            title: {
                text: 'Quantidade de Membros'
            }
        }, {
            title: {
                text: 'Cumulativo'
            },
            labels: {
                formatter: function () {
                    return this.value + '%';
                }
            },
            max: 100,
            min: 0,
            opposite: true,
            
        }],
        series: [{
            data: [1, 1, 6, 6, 6],
            name: 'Avaliações',
            type: 'column'
        }, {
            data: [100/22, 200/22, 800/22, 1400/22, 2000/22],
            name: 'Cumulativo',
            type: 'spline',
            yAxis: 1,
            id: 'accumulated'
        }]
    });
});

       </script>
    </head>
    <body>
<script src="https://code.highcharts.com/highcharts.js"></script>
<script src="https://code.highcharts.com/modules/exporting.js"></script>

<div id="Question15" style="min-width: 310px; height: 400px; margin: 0 auto"></div>
    </body>
</html>
